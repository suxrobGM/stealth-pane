name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set version in projects
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          foreach ($proj in @(
            "src/StealthCode/StealthCode.csproj",
            "src/StealthCode.Launcher/StealthCode.Launcher.csproj"
          )) {
            (Get-Content $proj) -replace '<Version>.*</Version>', "<Version>$version</Version>" | Set-Content $proj
          }

      - name: Publish
        shell: pwsh
        working-directory: scripts
        run: .\publish.ps1

      - name: Create release archive
        shell: pwsh
        run: |
          Compress-Archive -Path "publish/win-x64/stealthcode.exe" -DestinationPath "publish/StealthCode-${{ steps.version.outputs.VERSION }}-win-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: publish/StealthCode-${{ steps.version.outputs.VERSION }}-win-x64.zip
